<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:3000 http://127.0.0.1:3000;">
    <title>Login</title>

    <link rel="stylesheet" href="../public/css/styles.css">
</head>

<body>

    <div class="RegisterForm-container">

        <h1>Login</h1>

        <form id="loginForm">

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter Email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>

            <p id="loginMsg"></p>

            <button type="submit">Login</button>
            <a href="register.html" style="text-align: center; text-decoration: none;">Already Have Account?</a>
        </form>

    </div>

    <script src="../public/js/login.js"></script>
</body>
</html>
