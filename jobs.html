<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - Workfiy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../public/css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="navbar-container">
                <!-- Logo -->
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="/Views/index.html" class="logo">Workfiy</a>
                    </div>
                </div>
                
                <!-- Navigation Links -->
                <div class="nav-links">
                    <a href="/Views/index.html" class="nav-link">Home</a>
                    <a href="/Views/jobs.html" class="nav-link active">Jobs</a>
                    <a href="/Views/scholarship.html" class="nav-link">Scholarships</a>
                </div>
                
                <!-- Login and Sign Up Buttons -->
                <div class="nav-buttons">
                    <button class="btn-login"><a href="/Views/login.html">Login</a></button>
                    <button class="btn-signup"><a href="/Views/register.html">Sign Up</a></button>
                </div>
                
                <!-- Mobile menu button -->
                <div>
                    <button id="mobile-menu-button" class="mobile-menu-btn">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile menu -->
        <div id="mobile-menu" class="mobile-menu hidden">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="/Views/index.html" class="mobile-menu-link">Home</a>
                <a href="/Views/jobs.html" class="mobile-menu-link">Jobs</a>
                <a href="/Views/scholarship.html" class="mobile-menu-link">Scholarships</a>
                <a href="#contact" class="mobile-menu-link">Contact Us</a>
                <div class="mobile-menu-divider">  
                <div class="space-y-2">
                    <button class="btn-login"><a href="/Views/login.html">Login</a></button>
                    <button class="btn-signup"><a href="/Views/register.html">Sign Up</a></button>
                </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                Find Your Perfect Job
            </h1>
            <p class="hero-subtitle">
                Browse through hundreds of job opportunities from top companies
            </p>
            
            <div class="search-container">
                <input type="text" 
                       id="search-input"
                       class="search-input"
                       placeholder="Search for jobs, companies, or keywords...">
                <div class="search-icon">
                    <i class="fas fa-search"></i>
                </div>
                <button type="button" 
                        id="search-button"
                        class="search-button">
                    Search
                </button>
            </div>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filter-section">
        <div class="max-w-7xl">
            <div class="filter-container">
                <div class="filter-group">
                    <select class="filter-select">
                        <option>All Categories</option>
                        <option>Engineering</option>
                        <option>Marketing</option>
                        <option>Design</option>
                        <option>Sales</option>
                        <option>Finance</option>
                    </select>
                    <select class="filter-select">
                        <option>All Locations</option>
                        <option>New York</option>
                        <option>San Francisco</option>
                        <option>Remote</option>
                        <option>London</option>
                        <option>Tokyo</option>
                    </select>
                    <select class="filter-select">
                        <option>Job Type</option>
                        <option>Full-time</option>
                        <option>Part-time</option>
                        <option>Contract</option>
                        <option>Freelance</option>
                    </select>
                </div>
                <div class="job-count">
                    <span class="font-semibold">245</span> jobs found
                </div>
            </div>
        </div>
    </section>

    <!-- Jobs Section -->
    <section class="section">
        <div class="max-w-7xl">
            <div id= "jobs" class="job-grid"></div>
            </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="max-w-7xl">
            <div class="footer-content">
                <div class="social-links">
                    <a href="#" class="social-link">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-link">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-link">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="social-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
                <p class="footer-text">
                    © 2024 Workfiy. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

<script src="../public/js/script.js"></script>
<script src="../public/js/jobs.js"></script>
</body>
</html>
